services:
  postgres:
    image: postgres:16-alpine
    container_name: cattery-db
    environment:
      POSTGRES_DB: cattery
      POSTGRES_USER: cattery
      POSTGRES_PASSWORD: cattery
    ports:
      - "5432:5432"
    volumes:
      - cattery_pg:/var/lib/postgresql/data

volumes:
  cattery_pg:

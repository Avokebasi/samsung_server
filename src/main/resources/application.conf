ktor {
    development = true
    deployment {
        port = 8080
        host = "0.0.0.0"
    }
    application {
        modules = [ com.cattery.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:h2:mem:cattery;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    user = "sa"
    password = ""
    driver = "org.h2.Driver"
    maxPoolSize = 5
}

jwt {
    secret = "cattery-dev-secret-change-in-production-min-256-bits!!"
    issuer = "cattery-api"
    audience = "cattery-app"
    realm = "Cattery"
    expirationMs = 604800000
}

flyway {
    locations = "classpath:db/migration-h2"
}
